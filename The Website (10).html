<html>
<head>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        .game-container {
            background-color: #333;
            display: grid;
            height: 100vh;
            grid-template-columns: 1fr 3fr 1fr;
            transition: all 0.3s ease;
        }
        /* Menu styles */
        .left-menu {
            transition: margin 0.3s ease;
            background: #222;
            color: white;
            height: 100%;
        }
        .right-menu {
            transition: margin 0.3s ease;
            background: #222;
            color: white;
            height: 100%;
        }
        .hidden {
            display: none;
        }
        /* Other styles as necessary */
    </style>
</head>
<body>
    <div class="game-container">
        <div class="left-menu"></div>
        <div class="game"></div>
        <div class="right-menu"></div>
    </div>
    <script>
        // JavaScript to handle menu states and transitions
    </script>
</body>
</html>
